[package]
edition = "2024"
name = "dioxus-nox-markdown"
version = "0.13.2"
description = "Headless markdown editor, previewer, and display components for Dioxus"
readme = "README.md"
keywords = [
    "dioxus",
    "markdown",
    "editor",
    "wasm",
]
categories = [
    "gui",
    "wasm",
    "web-programming",
]
license = "MIT"
repository = "https://github.com/7A9599F5/dioxus-nox"
resolver = "2"

[features]
default = ["web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]
sanitize = ["dep:ammonia"]
syntax-highlighting = ["dep:syntect"]
web = ["dioxus/web"]

[lib]
name = "dioxus_nox_markdown"
path = "src/lib.rs"

[[example]]
name = "basic_editor"
path = "examples/basic_editor.rs"

[[example]]
name = "inline_preview"
path = "examples/inline_preview.rs"

[[example]]
name = "live_preview"
path = "examples/live_preview.rs"

[[example]]
name = "read_only"
path = "examples/read_only.rs"

[[example]]
name = "tailwind_styled"
path = "examples/tailwind_styled.rs"

[dependencies.ammonia]
version = "4"
optional = true

[dependencies.crop]
version = "0.4.3"

[dependencies.dioxus]
workspace = true

[dependencies.gloo-timers]
version = "0.3"
features = ["futures"]

[dependencies.pulldown-cmark]
version = "0.13.1"

[dependencies.syntect]
version = "5.3"
features = [
    "default-fancy",
    "html",
]
optional = true
default-features = false

[dev-dependencies.dioxus-ssr]
version = "0.7.4"
