[package]
name = "addzdero-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Pure CLI novel-to-video pipeline"
homepage = "https://github.com/zjarlin/addzero-lib-rust"
repository = "https://github.com/zjarlin/addzero-lib-rust"
readme = "README.md"

[[bin]]
name = "addzdero-cli"
path = "src/main.rs"

[package.metadata.dist]
dist = true
npm-package = "addzdero-cli"

[dependencies]
anyhow.workspace = true
clap = { version = "4.5.48", features = ["derive"] }
encoding_rs = "0.8.35"
regex.workspace = true
reqwest.workspace = true
scraper = "0.24.0"
serde.workspace = true
serde_json.workspace = true

[lints]
workspace = true
